<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login y Registro | Anonymous</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
            padding:20px;
        }

        .contenedor{
            width:100%;
            max-width:1000px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:25px;
        }

        .card{
            background:#ffffff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#222;
            font-size:28px;
        }

        .grupo{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            color:#555;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #dcdcdc;
            border-radius:8px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#333;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#111;
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#333;
        }

        .enlace{
            text-align:center;
            margin-top:15px;
        }

        .enlace a{
            text-decoration:none;
            color:#444;
        }

        .enlace a:hover{
            color:black;
        }

        footer{
            text-align:center;
            margin-top:25px;
            color:#777;
            font-size:14px;
        }
    </style>
</head>

<body>

    <div>

        <div class="contenedor">

            <!-- LOGIN -->
            <div class="card">

                <h1>Iniciar sesion</h1>

                <form>

                    <div class="grupo">
                        <label>Correo electrónico</label>
                        <input type="email" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="grupo">
                        <label>Contraseña</label>
                        <input type="password" placeholder="********" required>
                    </div>

                    <button type="submit">Ingresar</button>

                    <div class="enlace">
                        <a href="index.html">Volver al inicio</a>
                    </div>

                </form>

            </div>

            <!-- REGISTRO -->
            <div class="card">

                <h1>Registro</h1>

                <form>

                    <div class="grupo">
                        <label>Nombre</label>
                        <input type="text" placeholder="Ingrese su nombre" required>
                    </div>

                    <div class="grupo">
                        <label>Apellido</label>
                        <input type="text" placeholder="Ingrese su apellido" required>
                    </div>

                    <div class="grupo">
                        <label>Fecha de nacimiento</label>
                        <input type="date" required>
                    </div>

                    <div class="grupo">
                        <label>Contraseña</label>
                        <input type="password" placeholder="Cree una contraseña" required>
                    </div>

                    <button type="submit">Registrarse</button>

                </form>

            </div>

        </div>

        <footer>
            © 2026 Historia de Anonymous - registro e inicio de sesión. Todos los derechos reservados.
        </footer>

    </div>

</body>

</html>
